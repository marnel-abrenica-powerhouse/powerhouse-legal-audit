name: Execute Powerhouse Automation Reports

on:
  schedule:
    # Runs every 4 hours (At minute 0 past every 4th hour)
    # Customize your cron expressions at https://crontab.guru/
    - cron: '*/30 * * * *'
  
  # Allows you to trigger this workflow manually from the GitHub UI Actions tab anytime
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm install

    - name: Run Core Sync Reports
      env:
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      run: node runAll.js

    - name: Run Secondary Missing Filetypes Utility
      env:
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      run: node fixMissingFileTypes.js