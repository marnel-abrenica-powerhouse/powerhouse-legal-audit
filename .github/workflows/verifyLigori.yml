name: Manual Verify Ligori Law

on:
  workflow_dispatch:

jobs:
  run-ligori-verification:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Initialize Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Execute Ligori Law Verification
      env:
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        LIGORI_COOKIE: ${{ secrets.LIGORI_COOKIE }}
        FORCE_COLOR: "1"
      run: node --no-warnings ligoriLawVerification.js